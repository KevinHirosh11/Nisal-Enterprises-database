<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/seettu.css">
    <title>Seettu</title>
</head>
<body>
    <div class="container">
        <h1>Seettu System</h1>

        <div class="layout">
            <div class="seat-container">
                <h2>Search Products</h2>

                <label for="productSearch">Product Name</label>
                <input type="text" id="productSearch" placeholder="Type product name to search" autocomplete="off">
                <div id="productResults" class="product-results" aria-label="Product search results"></div>

                <select id="productSelect" class="hidden-select" onchange="populateProductDetails()" tabindex="-1" aria-hidden="true">
                    <option value="">-- Select Product --</option>
                </select>

                <div class="product-details">
                    <p>Category: <span id="productCategory">-</span></p>
                    <p>Price: Rs <span id="productPrice">0</span></p>
                    <p>Available Quantity: <span id="productQty">0</span></p>
                </div>

                <label for="quantity">Quantity</label>
                <input type="number" id="quantity" min="1" value="1" onchange="calculateTotal()">

                <p class="total">Total Amount: Rs <span id="totalAmount">0</span></p>
                <button class="primary-btn" onclick="addToSeat()">Add to Seat</button>
            </div>

            <div class="table-box" id="seats">
                <h2>Seat Details</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Qty</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="seatTable"></tbody>
                </table>
                <p class="grand-total">Grand Total: Rs <span id="grandTotal">0</span></p>

                <div class="customer-details">
                    <h3>Customer Details</h3>
                    <div class="customer-grid">
                        <div class="field">
                            <label for="billCustomerName">Customer Name</label>
                            <input type="text" id="billCustomerName" placeholder="Enter customer name">
                        </div>
                        <div class="field">
                            <label for="billCustomerPhone">Customer Phone Number</label>
                            <input type="text" id="billCustomerPhone" placeholder="Enter customer phone number">
                        </div>
                        <div class="field">
                            <label for="billCustomerID">Customer ID</label>
                            <input type="text" id="billCustomerID" placeholder="Enter customer ID">
                        </div>
                        <div class="field full">
                            <label for="billCustomerAddress">Customer Address</label>
                            <input type="text" id="billCustomerAddress" placeholder="Enter customer address">
                        </div>
                    </div>
                </div>

                <div class="button-group">
                    <button class="primary-btn" onclick="saveSeettu()">Save to Database</button>
                    <button class="ghost-btn" onclick="clearSeatForm()">Clear</button>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/seettu.js"></script>
</body>
</html>
